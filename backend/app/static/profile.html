<!DOCTYPE html>
<html>

<head>
    <title>Profile</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body class="profile-page">

<div class="profile-wrapper">

    <div class="profile-card-modern">

        <!-- TOP SECTION -->
        <div class="profile-header">

            <div class="avatar-wrapper">
                <img id="profilePic" src="/static/assets/logo-primary.svg" class="profile-avatar">
                
                <input type="file" id="picUpload" hidden>
                <div class="avatar-edit" onclick="triggerUpload()">✏️</div>
            </div>

            <h2 id="name"></h2>
            <p class="edit-text">Tap to edit details</p>

        </div>

        <hr>

        <!-- INFO SECTION -->
        <div class="profile-info">

            <div class="info-row">
                <span>Email</span>
                <span id="email"></span>
            </div>

            <div class="info-row">
                <span>Phone</span>
                <span class="editable" data-field="phone" id="phone"></span>
            </div>

            <div class="info-row">
                <span>Age</span>
                <span id="age"></span>
            </div>

        </div>

        <hr>

        <!-- PASSWORD -->
        <div class="profile-password">

            <h3>Change Password</h3>

            <input id="oldPassword" type="password" placeholder="Old Password">
            <input id="newPassword" type="password" placeholder="New Password">

            <button onclick="changePassword()">Update Password</button>

        </div>

    </div>

</div>

<script src="/static/js/profile.js"></script>

</body>
</html>
